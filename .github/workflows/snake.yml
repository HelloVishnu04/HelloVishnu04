name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # Runs every day at midnight
  workflow_dispatch:        # Lets you run it manually too

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: hellovishnu04
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push output to "output" branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

5. Click **"Commit changes"** → **"Commit directly to main"**

---

### Step 3 — Run it manually the first time

1. Go to your repo → click **"Actions"** tab
2. Click **"Generate Snake Animation"** in the left sidebar
3. Click the **"Run workflow"** dropdown → **"Run workflow"**
4. Wait ~30 seconds — it will create an `output` branch with your snake SVGs ✅

---

### Step 4 — Verify it worked

Go to:
```
https://raw.githubusercontent.com/hellovishnu04/hellovishnu04/output/github-snake.svg
```
If you see a snake SVG — **you're done!** 🐍

The README already points to exactly this URL, so the animation will appear automatically.

